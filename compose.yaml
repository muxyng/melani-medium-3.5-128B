services:
  vllm:
    image: ${VLLM_IMAGE:-vllm/vllm-openai-rocm:nightly}
    pull_policy: always
    restart: unless-stopped
    ipc: host
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    ports:
      - "${VLLM_PORT:-8000}:8000"
    volumes:
      - ${MODEL_CACHE_DIR:-hf-cache}:/models/huggingface
    environment:
      HF_TOKEN: ${HF_TOKEN:?Set HF_TOKEN in .env or the environment}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:?Set HF_TOKEN in .env or the environment}
      HF_HOME: /models/huggingface
      HF_HUB_CACHE: /models/huggingface/hub
      VLLM_CACHE_ROOT: /models/huggingface/vllm
      ROCR_VISIBLE_DEVICES: ${ROCR_VISIBLE_DEVICES:-0,1,2,3,4,5,6,7}
      HIP_VISIBLE_DEVICES: ${HIP_VISIBLE_DEVICES:-0,1,2,3,4,5,6,7}
      PYTORCH_HIP_ALLOC_CONF: ${PYTORCH_HIP_ALLOC_CONF:-expandable_segments:True}
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - ${MODEL_ID:-mistralai/Mistral-Medium-3.5-128B}
      - --served-model-name
      - ${SERVED_MODEL_NAME:-mistral-medium-3.5-128b}
      - --download-dir
      - /models/huggingface
      - --dtype
      - bfloat16
      - --max-model-len
      - ${MAX_MODEL_LEN:-262144}
      - --gpu-memory-utilization
      - ${GPU_MEMORY_UTILIZATION:-0.80}
      - --max-num-batched-tokens
      - ${MAX_NUM_BATCHED_TOKENS:-16384}
      - --max-num-seqs
      - ${MAX_NUM_SEQS:-128}
      - --tensor-parallel-size
      - ${TENSOR_PARALLEL_SIZE:-8}
      - --config-format
      - mistral
      - --load-format
      - mistral
      - --tokenizer-mode
      - mistral
      - --tool-call-parser
      - mistral
      - --reasoning-parser
      - mistral
      - --enable-auto-tool-choice

volumes:
  hf-cache:
