services:
  sglang:
    image: ${SGLANG_IMAGE:-rocm/sgl-dev:v0.5.10.post1-rocm720-mi30x-20260502}
    pull_policy: always
    restart: unless-stopped
    ipc: host
    shm_size: 32g
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    security_opt:
      - seccomp=unconfined
    ports:
      - "127.0.0.1:${SGLANG_PORT:-8002}:8000"
    volumes:
      - ${MODEL_CACHE_DIR:-hf-cache}:/root/.cache/huggingface
      - ${SGLANG_CACHE_DIR:-sglang-cache}:/root/.cache/sglang
    environment:
      HF_TOKEN: ${HF_TOKEN:?Set HF_TOKEN in .env or the environment}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:?Set HF_TOKEN in .env or the environment}
      ROCR_VISIBLE_DEVICES: ${ROCR_VISIBLE_DEVICES:-0}
      HIP_VISIBLE_DEVICES: ${HIP_VISIBLE_DEVICES:-0}
      HSA_NO_SCRATCH_RECLAIM: ${HSA_NO_SCRATCH_RECLAIM:-1}
      PYTORCH_CUDA_ALLOC_CONF: ${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True}
      PYTORCH_HIP_ALLOC_CONF: ${PYTORCH_HIP_ALLOC_CONF:-expandable_segments:True}
    command:
      - python3
      - -m
      - sglang.launch_server
      - --model-path
      - ${MODEL_ID:-mistralai/Mistral-Medium-3.5-128B}
      - --served-model-name
      - ${SERVED_MODEL_NAME:-mistral-medium-3.5-128b}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --api-key
      - ${VLLM_API_KEY:?Set VLLM_API_KEY in .env or the environment}
      - --tp
      - ${TENSOR_PARALLEL_SIZE:-1}
      - --context-length
      - ${MAX_MODEL_LEN:-32768}
      - --mem-fraction-static
      - ${GPU_MEMORY_UTILIZATION:-0.80}

volumes:
  hf-cache:
  sglang-cache:
