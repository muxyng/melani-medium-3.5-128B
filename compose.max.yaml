services:
  max:
    image: ${MAX_IMAGE:-modular/max-amd:nightly}
    pull_policy: always
    restart: unless-stopped
    ipc: host
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    security_opt:
      - seccomp=unconfined
    ports:
      - "127.0.0.1:${MAX_PORT:-8001}:8000"
    volumes:
      - ${MODEL_CACHE_DIR:-hf-cache}:/root/.cache/huggingface
      - ${MAX_CACHE_DIR:-max-cache}:/opt/venv/share/max/.max_cache
    environment:
      HF_TOKEN: ${HF_TOKEN:?Set HF_TOKEN in .env or the environment}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:?Set HF_TOKEN in .env or the environment}
      MODULAR_STRUCTURED_LOGGING: ${MODULAR_STRUCTURED_LOGGING:-0}
      MAX_SERVE_DISABLE_TELEMETRY: ${MAX_SERVE_DISABLE_TELEMETRY:-1}
      ROCR_VISIBLE_DEVICES: ${ROCR_VISIBLE_DEVICES:-0}
      HIP_VISIBLE_DEVICES: ${HIP_VISIBLE_DEVICES:-0}
    command:
      - --model
      - ${MODEL_ID:-mistralai/Mistral-Medium-3.5-128B}
      - --served-model-name
      - ${SERVED_MODEL_NAME:-mistral-medium-3.5-128b}
      - --devices
      - gpu:0
      - --max-length
      - ${MAX_MODEL_LEN:-32768}
      - --max-batch-input-tokens
      - ${MAX_NUM_BATCHED_TOKENS:-8192}
      - --max-batch-size
      - ${MAX_NUM_SEQS:-4}
      - --device-memory-utilization
      - ${GPU_MEMORY_UTILIZATION:-0.80}

volumes:
  hf-cache:
  max-cache:
